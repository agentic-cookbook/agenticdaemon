name: AgenticDaemon
options:
  bundleIdPrefix: com.agentic-cookbook
  xcodeVersion: "2640"
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
    CLANG_ENABLE_EXPLICIT_MODULES: NO
    DEAD_CODE_STRIPPING: YES
    ENABLE_MODULE_VERIFIER: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++14"
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    LM_FILTER_WARNINGS: YES
    OTHER_LDFLAGS: "$(inherited) -weak_framework AppIntents"

packages:
  plcrashreporter:
    url: https://github.com/microsoft/plcrashreporter.git
    from: "1.8.0"

targetTemplates:
  SwiftLint:
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            export PATH="/opt/homebrew/bin:$PATH"
          fi
          if which swiftlint >/dev/null; then
            swiftlint lint --quiet --strict
          else
            echo "warning: SwiftLint not installed; brew install swiftlint to enable"
          fi

targets:
  DaemonKit:
    type: framework
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: DaemonKit/Sources/DaemonKit
    dependencies:
      - package: plcrashreporter
        product: CrashReporter
    settings:
      base:
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        # Library evolution is required so `@_implementationOnly` imports
        # (CrashReporter inside CrashReportCollector) don't produce a
        # runtime-instability warning.
        BUILD_LIBRARY_FOR_DISTRIBUTION: YES

  AgenticJobKit:
    type: library.dynamic
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: AgenticDaemon/Sources/AgenticJobKit
    settings:
      base:
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        EXECUTABLE_PREFIX: lib

  AgenticXPCProtocol:
    type: library.static
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: AgenticDaemon/Sources/AgenticXPCProtocol
    dependencies:
      - target: DaemonKit
    settings:
      base:
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES

  AgenticDaemonLib:
    type: library.static
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: AgenticDaemon/Sources/AgenticDaemonLib
    dependencies:
      - target: AgenticJobKit
      - target: AgenticXPCProtocol
      - target: DaemonKit
      - sdk: libsqlite3.tbd
    settings:
      base:
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES

  MenuBarKit:
    type: framework
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: MenuBarKit/Sources/MenuBarKit
    dependencies:
      - target: DaemonKit
    settings:
      base:
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES

  AgenticMenuBarLib:
    type: library.static
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: AgenticDaemon/Sources/AgenticMenuBarLib
    dependencies:
      - target: AgenticXPCProtocol
      - target: DaemonKit
    settings:
      base:
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES

  agenticdaemon:
    type: tool
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: AgenticDaemon/Sources/CLI
    dependencies:
      - target: AgenticDaemonLib
      - target: AgenticJobKit
      - target: AgenticXPCProtocol
      - target: DaemonKit
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_NAME: agenticdaemon

  AgenticMenuBar:
    type: tool
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: AgenticDaemon/Sources/AgenticMenuBar
    dependencies:
      - target: AgenticMenuBarLib
      - target: AgenticXPCProtocol
      - target: DaemonKit
    settings:
      base:
        PRODUCT_NAME: AgenticMenuBar

  DaemonKitTests:
    type: bundle.unit-test
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: DaemonKit/Tests/DaemonKitTests
    dependencies:
      - target: DaemonKit

  MenuBarKitTests:
    type: bundle.unit-test
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: MenuBarKit/Tests/MenuBarKitTests
    dependencies:
      - target: MenuBarKit
      - target: DaemonKit

  AgenticDaemonTests:
    type: bundle.unit-test
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: AgenticDaemon/Tests
        excludes:
          - "AgenticMenuBarTests/**"
    dependencies:
      - target: AgenticDaemonLib
      - target: AgenticJobKit
      - target: AgenticXPCProtocol
      - target: DaemonKit
      - sdk: libsqlite3.tbd

  AgenticMenuBarTests:
    type: bundle.unit-test
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: AgenticDaemon/Tests/AgenticMenuBarTests
    dependencies:
      - target: AgenticMenuBarLib
      - target: AgenticXPCProtocol
      - target: DaemonKit

aggregateTargets:
  AgenticDaemonMacOSAll:
    targets:
      - DaemonKit
      - AgenticJobKit
      - AgenticXPCProtocol
      - AgenticDaemonLib
      - MenuBarKit
      - AgenticMenuBarLib
      - agenticdaemon
      - AgenticMenuBar

  AgenticDaemonMacOSTestsAll:
    targets:
      - DaemonKitTests
      - MenuBarKitTests
      - AgenticDaemonTests
      - AgenticMenuBarTests

schemes:
  AgenticDaemon:
    build:
      targets:
        agenticdaemon: all
        AgenticMenuBar: all
    test:
      targets:
        - DaemonKitTests
        - MenuBarKitTests
        - AgenticDaemonTests
        - AgenticMenuBarTests

  AgenticDaemonMacOSAll:
    build:
      targets:
        AgenticDaemonMacOSAll: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  AgenticDaemonMacOSTestsAll:
    build:
      targets:
        AgenticDaemonMacOSTestsAll: all
    test:
      config: Debug
      targets:
        - DaemonKitTests
        - MenuBarKitTests
        - AgenticDaemonTests
        - AgenticMenuBarTests
    run:
      config: Debug
    analyze:
      config: Debug
